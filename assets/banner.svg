<svg viewBox="0 0 880 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="better-harnesses-smaller-models: a small model bar raised by a scaffold to the height of a tall frontier bar, at a fraction of the cost">
  <defs>
    <linearGradient id="ramp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="50%" stop-color="#9b8cf7"/>
      <stop offset="100%" stop-color="#ef6fd0"/>
    </linearGradient>
  </defs>

  <text x="440" y="50" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', Menlo, Consolas, monospace" font-size="30" font-weight="700" fill="url(#ramp)">better-harnesses-smaller-models</text>
  <text x="440" y="82" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', Menlo, Consolas, monospace" font-size="12.5" fill="#8b949e">lift the task into the harness &#183; 90% cheaper &#183; discovered by a meta-agent</text>

  <!-- baseline -->
  <line x1="180" y1="196" x2="700" y2="196" stroke="#8b949e" stroke-opacity="0.45"/>

  <!-- frontier LLM bar: tall, expensive -->
  <rect x="250" y="112" width="70" height="84" rx="6" fill="#ef6fd0" fill-opacity="0.25" stroke="#ef6fd0"/>
  <text x="285" y="146" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', Menlo, Consolas, monospace" font-size="11" fill="#8b949e">LLM</text>
  <text x="285" y="212" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', Menlo, Consolas, monospace" font-size="11" fill="#8b949e">$$$$</text>

  <!-- SLM bar alone: short -->
  <rect x="430" y="166" width="70" height="30" rx="6" fill="#58a6ff" fill-opacity="0.25" stroke="#58a6ff"/>
  <text x="465" y="186" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', Menlo, Consolas, monospace" font-size="11" fill="#8b949e">SLM</text>
  <text x="465" y="212" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', Menlo, Consolas, monospace" font-size="11" fill="#8b949e">$</text>

  <!-- SLM + harness: scaffold raises it to LLM height -->
  <g>
    <rect x="610" y="166" width="70" height="30" rx="6" fill="#58a6ff" fill-opacity="0.25" stroke="#58a6ff"/>
    <text x="645" y="186" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', Menlo, Consolas, monospace" font-size="11" fill="#8b949e">SLM</text>
    <!-- scaffold lattice -->
    <g stroke="#9b8cf7" stroke-width="1.5" opacity="0">
      <rect x="610" y="112" width="70" height="54" rx="6" fill="none"/>
      <line x1="610" y1="139" x2="680" y2="139"/>
      <line x1="610" y1="112" x2="680" y2="166"/>
      <line x1="680" y1="112" x2="610" y2="166"/>
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.4;1" dur="1.6s" fill="freeze"/>
    </g>
    <text x="645" y="106" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', Menlo, Consolas, monospace" font-size="10" fill="#9b8cf7" opacity="0">harness
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.6;1" dur="2s" fill="freeze"/>
    </text>
    <text x="645" y="212" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', Menlo, Consolas, monospace" font-size="11" fill="#8b949e">$</text>
  </g>

  <!-- equal-height marker -->
  <g stroke="#8b949e" stroke-opacity="0.5" stroke-dasharray="4 4">
    <line x1="320" y1="112" x2="610" y2="112"/>
  </g>
</svg>
